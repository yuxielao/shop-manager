services:
  - type: web
    name: shop-manager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shop-db
          property: connectionString

databases:
  - name: shop-db
    plan: free
